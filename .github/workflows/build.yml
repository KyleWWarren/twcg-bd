name: Build TWCG SPFx Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node 14
        uses: actions/setup-node@v4
        with:
          node-version: '14.21.3'

      - name: Install Python and build tools
        run: |
          sudo apt-get install -y python3 make g++
          npm config set python python3

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Install node-sass with binary
        run: |
          npm install --ignore-scripts node-sass@4.14.1
          node node_modules/node-sass/scripts/install.js

      - name: Install gulp locally
        run: npm install --ignore-scripts gulp@4.0.2 gulp-cli

      - name: Install sp-build-web
        run: npm install --ignore-scripts @microsoft/sp-build-web

      - name: Bundle
        run: node_modules/.bin/gulp bundle --ship

      - name: Package solution
        run: node_modules/.bin/gulp package-solution --ship

      - name: Upload sppkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: twcg-bd-platform
          path: sharepoint/solution/*.sppkg
          retention-days: 30