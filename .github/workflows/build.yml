name: Build TWCG SPFx Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.4'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Disable lint
        run: find node_modules/@microsoft/rush-stack-compiler-4.5/lib -name "LintRunner.js" -exec sed -i 's/new compiler.typescript.Program/\/\/new compiler.typescript.Program/g' {} \;

      - name: Bundle
        run: node_modules/.bin/gulp bundle --ship

      - name: Package solution
        run: node_modules/.bin/gulp package-solution --ship

      - name: Upload sppkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: twcg-bd-platform
          path: sharepoint/solution/*.sppkg
          retention-days: 30