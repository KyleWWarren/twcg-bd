name: Build TWCG SPFx Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.4'

      - name: Install SPFx toolchain
        run: npm install -g yo gulp-cli @microsoft/generator-sharepoint@1.18.0

      - name: Scaffold fresh SPFx project
        run: |
          mkdir /tmp/spfx-build
          cd /tmp/spfx-build
          yo @microsoft/sharepoint \
            --solution-name "twcg-bd-platform" \
            --component-type "webpart" \
            --component-name "TwcgbdPlatform" \
            --framework "none" \
            --no-telemetry \
            --environment "spo"

      - name: Install scaffold dependencies
        run: |
          cd /tmp/spfx-build
          npm install

      - name: Copy web part source
        run: |
          cp $GITHUB_WORKSPACE/src/webparts/twcgbdPlatform/TwcgbdPlatformWebPart.ts \
             /tmp/spfx-build/src/webparts/twcgbdPlatform/TwcgbdPlatformWebPart.ts
          cp $GITHUB_WORKSPACE/src/webparts/twcgbdPlatform/TwcgbdPlatformWebPart.manifest.json \
             /tmp/spfx-build/src/webparts/twcgbdPlatform/TwcgbdPlatformWebPart.manifest.json

      - name: Bundle
        run: |
          cd /tmp/spfx-build
          gulp bundle --ship

      - name: Package solution
        run: |
          cd /tmp/spfx-build
          gulp package-solution --ship

      - name: Upload sppkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: twcg-bd-platform
          path: /tmp/spfx-build/sharepoint/solution/*.sppkg
          retention-days: 30